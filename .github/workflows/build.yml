name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android build tools
        run: |
          cargo install cargo-make --locked
          cargo make sdk

      - name: Restore signing key
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          test -n "$SIGNING_KEY"
          printf '%s' "$SIGNING_KEY" | base64 --decode > signing-key.jks

      - name: Build signed APK
        env:
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: cargo make --profile release apk

      - name: Package artifact
        env:
          VERSION_SUFFIX: ${{ startsWith(github.ref, 'refs/tags/v') && format('-{0}', github.ref_name) || '' }}
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk "artifacts/bark${VERSION_SUFFIX}-release.apk"

      - name: Upload artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: bark-release
          path: artifacts/*

      - name: Create release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: ncipollo/release-action@v1.16.0
        with:
          generateReleaseNotes: true
          artifacts: artifacts/*
