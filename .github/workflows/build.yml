name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android build tools
        run: |
          cargo install cargo-make --locked
          cargo make sdk

      - name: Restore signing key
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          test -n "$SIGNING_KEY"
          printf '%s' "$SIGNING_KEY" | base64 --decode > signing-key.jks

      - name: Build signed APK
        env:
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: cargo make --profile release apk

      - name: Build Linux daemon
        run: |
          sudo apt-get update
          sudo apt-get install --yes libasound2-dev libopus-dev
          cargo build --release --locked --package daemon

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk "artifacts/bark-${{ github.ref_name }}-release.apk"
          tar -C target/release -czf "artifacts/barkd-${{ github.ref_name }}-linux-x86_64.tar.gz" barkd

      - name: Create release
        uses: ncipollo/release-action@v1.16.0
        with:
          generateReleaseNotes: true
          artifacts: artifacts/*
